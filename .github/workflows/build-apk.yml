name: Build APK Repartidor (Capacitor)

# Compila la PWA del repartidor como APK Android firmado y lo publica en
# gh-pages-admin/download/routefleet.apk para descarga directa desde el dominio.
on:
  workflow_dispatch:        # Se lanza manualmente cuando quieras una nueva version del APK

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build PWA del repartidor
        working-directory: client
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm install
          npm run build

      - name: Capacitor - anadir plataforma Android y sincronizar
        working-directory: client
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Generar keystore y firmar APK (password en secret, clave efimera en el runner)
        working-directory: client/android
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_ALIAS: routefleet
        run: |
          keytool -genkeypair -v -keystore app/release-key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias routefleet -storepass "$STORE_PASSWORD" -keypass "$STORE_PASSWORD" -dname "CN=KAVANA RouteFleet, OU=RouteFleet, O=Kavana Systems, L=Valencia, ST=Valencia, C=ES"
          sed -i 's/signingConfigs { debug {/signingConfigs { release { storeFile file("release-key.jks"); storePassword System.getenv("STORE_PASSWORD"); keyAlias "routefleet"; keyPassword System.getenv("STORE_PASSWORD"); } debug {/' app/build.gradle
          ./gradlew assembleRelease

      - name: Preparar publicacion (solo el APK)
        run: |
          mkdir -p apk-publish
          cp client/android/app/build/outputs/apk/release/app-release.apk apk-publish/routefleet.apk

      - name: Publicar APK en gh-pages-admin/download (sin tocar panel/app)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages-admin
          git checkout -B gh-pages-admin origin/gh-pages-admin
          mkdir -p download
          cp client/android/app/build/outputs/apk/release/app-release.apk download/routefleet.apk
          git add download/routefleet.apk
          git commit -m "chore: publicar APK repartidor v${GITHUB_RUN_NUMBER}" || echo "sin cambios"
          git push origin gh-pages-admin
