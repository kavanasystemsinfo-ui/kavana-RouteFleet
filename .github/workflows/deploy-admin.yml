name: Deploy Admin (Torre de Control) to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Instalar y build del panel de oficinas
        working-directory: client-admin
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm install
          npm run build
      - name: Publicar en rama gh-pages-admin
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client-admin/dist
          publish_branch: gh-pages-admin
          force_orphan: true
