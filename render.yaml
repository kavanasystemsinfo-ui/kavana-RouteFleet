# Render deployment para KAVANA RouteFleet (backend API)
services:
  - type: web
    name: kavana-routefleet-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    plan: free
    branch: main
    healthCheckPath: /api/settings
    envVars:
      - key: PORT
        value: "5001"
      - key: NODE_ENV
        value: production
